<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS Admin Input</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #050A1A; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; }
        .form-box { background: #0A192F; border: 2px solid #D4AF37; padding: 30px; border-radius: 20px; max-width: 380px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-family: 'Cinzel', serif; color: #D4AF37; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #D4AF37; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box; }
        .btn-input { width: 100%; padding: 15px; background: linear-gradient(45deg, #D4AF37, #FDFDD0); color: black; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-family: 'Cinzel', serif; font-size: 16px; transition: 0.3s; }
        .btn-input:active { transform: scale(0.95); }
        #status { margin-top: 15px; font-size: 12px; color: #D4AF37; font-style: italic; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>INPUT PENGELUARAN BBS</h2>
        <input type="text" id="desc" placeholder="Rincian (Bensin, Kopi, dll)">
        <input type="number" id="cost" placeholder="Nominal (Contoh: 50000)">
        <button class="btn-input" id="btnSubmit" onclick="submitData()">INPUT BOMM! 🚀</button>
        <div id="status"></div>
    </div>

<script>
    // --- KONFIGURASI ALAMAT SULTAN ---
    const T = "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"; 
    const O = "yefryZA";
    const R = "PT.BBS";
    const P = "dashboard.html";

    async function submitData() {
        const desc = document.getElementById('desc').value;
        const cost = document.getElementById('cost').value;
        const btn = document.getElementById('btnSubmit');
        const status = document.getElementById('status');

        if(!desc || !cost) return alert("Isi dulu Bos!");

        btn.disabled = true;
        status.innerText = "⏳ Mengirim Data ke Brankas...";

        try {
            const res = await fetch(`https://api.github.com/repos/${O}/${R}/contents/${P}`, {
                headers: { Authorization: `token ${T}` }
            });
            const file = await res.json();
            let text = decodeURIComponent(escape(window.atob(file.content.replace(/\s/g, ''))));

            const today = new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit'});
            const newItem = `{ tgl: "${today}", desc: "${desc}", cost: ${Number(cost)} },`;
            
            // Masukkan data baru ke dalam list
            text = text.replace("listPengeluaran: [", "listPengeluaran: [\n            " + newItem);

            const up = await fetch(`https://api.github.com/repos/${O}/${R}/contents/${P}`, {
                method: "PUT",
                headers: { Authorization: `token ${T}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    message: "BBS Update: " + desc,
                    content: btoa(unescape(encodeURIComponent(text))),
                    sha: file.sha
                })
            });

            if(up.ok) {
                alert("SENGGOL DONG! BERHASIL!");
                location.reload();
            } else { alert("Gagal! Cek Token."); }
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
