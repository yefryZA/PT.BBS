<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS Admin Input</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #050A1A; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; }
        .form-box { background: #0A192F; border: 2px solid #D4AF37; padding: 30px; border-radius: 20px; max-width: 380px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-family: 'Cinzel', serif; color: #D4AF37; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #D4AF37; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box; outline: none; }
        .btn-input { width: 100%; padding: 15px; background: linear-gradient(45deg, #D4AF37, #FDFDD0); color: black; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-family: 'Cinzel', serif; font-size: 16px; transition: 0.3s; }
        #status { margin-top: 15px; font-size: 12px; color: #D4AF37; min-height: 20px; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2 style="text-align: center; font-family: 'Cinzel', serif; color: var(--gold);">
    INPUT OPERASIONAL<br>
    <span style="font-size: 0.8em; color: var(--cream);">PT. BERKAH BAJA STEEL</span>
</h2>
        <input type="text" id="desc" placeholder="Rincian (Bensin, Solar, dll)">
        <input type="number" id="cost" placeholder="Nominal (Contoh: 50000)">
        <button class="btn-input" id="btnSubmit" onclick="submitData()">INPUT BOMM! 🚀</button>
        <div id="status"></div>
    </div>

<script>
    const O = "yefryZA";
    const R = "PT.BBS";
    const P = "dashboard.html";

    async function submitData() {
        const desc = document.getElementById('desc').value;
        const cost = document.getElementById('cost').value;
        if(!desc || !cost) return alert("Isi dulu Bos!");

        // 1. Minta Token (Habi tempel token ghp_ di sini nanti)
        const T = prompt("MASUKKAN TOKEN GITHUB (ghp_...) :"); 
        if(!T) return alert("Wajib masukkan token!");

        const btn = document.getElementById('btnSubmit');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerText = "⏳ Sedang Menembus Brankas BBS...";

        try {
            // AMBIL FILE DENGAN IZIN RESMI
            const res = await fetch(`https://api.github.com/repos/${O}/${R}/contents/${P}`, {
                method: "GET",
                headers: { 
                    "Authorization": "token " + T.trim(),
                    "Accept": "application/vnd.github.v3+json"
                }
            });

            if (!res.ok) throw new Error("Gagal Akses: " + res.statusText);

            const file = await res.json();
            let text = decodeURIComponent(escape(window.atob(file.content.replace(/\s/g, ''))));

            const today = new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit'});
            const newItem = `{ tgl: "${today}", desc: "${desc}", cost: ${Number(cost)} },`;
            
            // Masukkan data baru ke list
            if (text.includes("listPengeluaran: [")) {
                text = text.replace("listPengeluaran: [", "listPengeluaran: [\n            " + newItem);
            } else {
                throw new Error("Struktur Dashboard berubah! Cek dashboard.html");
            }

            // KIRIM DATA (BOMM!)
            const up = await fetch(`https://api.github.com/repos/${O}/${R}/contents/${P}`, {
                method: "PUT",
                headers: { 
                    "Authorization": "token " + T.trim(),
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    message: "Update BBS: " + desc,
                    content: btoa(unescape(encodeURIComponent(text))),
                    sha: file.sha
                })
            });

            if(up.ok) {
                alert("✅ SENGGOL DONG! DATA MASUK BRANKAS!");
                location.reload();
            } else {
                throw new Error("Gagal Update! Cek koneksi.");
            }

        } catch (e) {
            alert("⚠️ INFO DARI CIMI: " + e.message);
            status.innerText = "❌ Masalah: " + e.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
