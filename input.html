<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS Admin Input</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #050A1A; color: white; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; }
        .form-box { background: #0A192F; border: 2px solid #D4AF37; padding: 30px; border-radius: 20px; max-width: 380px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { font-family: 'Cinzel', serif; color: #D4AF37; margin-bottom: 25px; font-size: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #D4AF37; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box; outline: none; font-size: 16px; }
        input::placeholder { color: rgba(255,255,255,0.3); }
        .btn-input { width: 100%; padding: 15px; background: linear-gradient(45deg, #D4AF37, #FDFDD0); color: black; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-family: 'Cinzel', serif; font-size: 16px; transition: 0.3s; }
        #status { margin-top: 15px; font-size: 12px; color: #D4AF37; min-height: 20px; }
        .label-input { text-align: left; display: block; font-size: 10px; color: #D4AF37; margin-bottom: 5px; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>INPUT OPERASIONAL BBS</h2>
        
        <label class="label-input">RINCIAN KERJA</label>
        <input type="text" id="desc" placeholder="Contoh: Bensin, Makan, dll">
        
        <label class="label-input">NOMINAL (OTOMATIS TITIK)</label>
        <input type="text" id="cost_display" placeholder="Rp 0" oninput="formatRupiah(this)">
        
        <button class="btn-input" id="btnSubmit" onclick="submitData()">INPUT BOMM! 🚀</button>
        <div id="status"></div>
    </div>

<script>
    const O = "yefryZA";
    const R = "PT.BBS";
    const P = "dashboard.html";

    // --- FUNGSI AUTO TITIK SAAT DIKETIK ---
    function formatRupiah(elemen) {
        let val = elemen.value.replace(/\D/g, ''); // Hapus semua karakter selain angka
        if (val === "") {
            elemen.value = "";
            return;
        }
        // Tambahkan titik setiap 3 angka
        elemen.value = new Intl.NumberFormat('id-ID').format(val);
    }

    async function submitData() {
        const desc = document.getElementById('desc').value;
        const costRaw = document.getElementById('cost_display').value.replace(/\./g, ''); // Buang titik sebelum kirim ke database
        
        if(!desc || !costRaw) return alert("Isi dulu Bos! Jangan kosong.");

        const T = prompt("MASUKKAN TOKEN GITHUB (ghp_...) :"); 
        if(!T) return alert("Wajib masukkan token!");

        const btn = document.getElementById('btnSubmit');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerText = "⏳ Sedang Menembus Brankas BBS...";

        try {
            const res = await fetch(`https://api.github.com/repos/${O}/${R}/contents/${P}`, {
                method: "GET",
                headers: { 
                    "Authorization": "token " + T.trim(),
                    "Accept": "application/vnd.github.v3+json"
                }
            });

            if (!res.ok) throw new Error("Gagal Akses: " + res.statusText);

            const file = await res.json();
            let text = decodeURIComponent(escape(window.atob(file.content.replace(/\s/g, ''))));

            const today = new Date().toLocaleDateString('id-ID', {day:'2-digit', month:'2-digit'});
            // Masukkan angka asli (tanpa titik) ke database
            const newItem = `{ tgl: "${today}", desc: "${desc}", cost: ${Number(costRaw)} },`;
            
            if (text.includes("listPengeluaran: [")) {
                text = text.replace("listPengeluaran: [", "listPengeluaran: [\n            " + newItem);
            } else {
                throw new Error("Struktur Dashboard berubah! Cek dashboard.html");
            }

            const up = await fetch(`https://api.github.com/repos/${O}/${R}/contents/${P}`, {
                method: "PUT",
                headers: { 
                    "Authorization": "token " + T.trim(),
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    message: "Update BBS: " + desc,
                    content: btoa(unescape(encodeURIComponent(text))),
                    sha: file.sha
                })
            });

            if(up.ok) {
                alert("✅ SENGGOL DONG! DATA MASUK BRANKAS!");
                location.reload();
            } else {
                throw new Error("Gagal Update! Cek koneksi.");
            }

        } catch (e) {
            alert("⚠️ INFO DARI CIMI: " + e.message);
            status.innerText = "❌ Masalah: " + e.message;
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
